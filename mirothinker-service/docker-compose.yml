version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: mirothinker-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirothinker-service
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./traces:/app/traces
      - ./logs:/app/logs
      - ./cache:/app/cache
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --limit-concurrency 10
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
